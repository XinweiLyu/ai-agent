    username: my_user
    password: Lyu@2026

server:
  # 使用固定端口，与 CloudBase Run 服务配置的端口一致
  port: 8123
  servlet:
    # context-path: /api
    context-path: /   # 原来是 /api

# SpringDoc OpenAPI 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.xinwei.aiagent.controller

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志配置（生产环境使用 INFO 级别）
logging:
  level:
    root: INFO
    com.xinwei.aiagent: INFO
    org.springframework.ai: INFO
    # 如果需要调试，可以临时开启以下配置
    # org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: debug

